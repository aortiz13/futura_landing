server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión para HTML/CSS/JS
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Cache largo para assets (no aplica acá porque la landing es 1 file,
  # pero queda armado por si en el futuro se agregan /assets).
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # index.html sin caché para que cambios se vean al toque tras redeploy.
  location = / {
    add_header Cache-Control "no-store, must-revalidate";
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck endpoint para Dokploy/Traefik
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
